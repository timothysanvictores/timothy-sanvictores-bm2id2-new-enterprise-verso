<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="/css/style.css" />
		<script src="/js/script.js" defer></script>
		<title>Verso</title>
	</head>
	<body>
		<img class="image-wrap profile-image" src="/assets/Rectangle 94.png" />
		<div id="content-border" class="border-gradient"></div>
		<div id="background"></div>

		<div id="top-nav-v2">
			<div>
				<div id="top-nav-left">
					<img src="/assets/icons/Add_Plus.svg" class="interactive-hover" />
				</div>
				<h2></h2>
				<div id="top-nav-right">
					<img src="assets/icons/Interface/Settings_Future.svg" class="interactive-hover" />
				</div>
			</div>
		</div>
		
		<div id="content-container" class="content-container-padding">
			<div id="profile-header">
				<div id="profile-header-info">
					<h2 id="profile-name">Faith Cruz</h2>
					<h5 id="profile-role">Post-Production Editor</h5>
					<h5 id="profile-location">Auckland, NZ</h5>
				</div>
				<div id="contact-icon-container">
					<img src="assets/icons/Phone.svg" />
					<img src="assets/icons/Mail.svg" />
				</div>
			</div>

			<div id="profile-section-selector">
				<div class="profile-selector-button false-selector interactive-hover"><img src="assets/icons/Menu_Alt_05.svg" /></div>
				<div class="profile-selector-button true-selector"><img src="assets/icons/Users.svg" /></div>
				<div class="profile-selector-button false-selector interactive-hover"><img src="assets/icons/Info.svg" /></div>
			</div>

			<div id="profile-projects">
				<div class="profile-sub-heading">
					<h3>Projects</h3>
					<img src="assets/icons/Add_Plus_small.svg" onclick="window.location.href='create-project-info.html'" class="interactive-hover" />
				</div>
				<div class="project-card interactive-hover" onclick="window.location.href='genesis-project.html'">
					<img src="assets/Rectangle 95.png"/>
					<div class="project-card-text">
						<h5>Genesis</h5>
						<p class="transparent-text">March 2025</p>
						<div class="project-card-collaborators">
							<div class="project-card-collaborators-img-container">
								<img src="assets/Ellipse 24.png" />
								<img src="assets/Ellipse 25.png" />
								<img src="assets/Ellipse 26.png" />
							</div>
							<p><u>Shervonne</u> and others...</p>
						</div>
					</div>
				</div>
				<div class="project-card interactive-hover" onclick="window.location.href='crescendo-project.html'">
					<img src="assets/Rectangle 93.png"/>
					<div class="project-card-text">
						<h5>Crescendo</h5>
						<p class="transparent-text">March 2025</p>
						<div class="project-card-collaborators">
							<div class="project-card-collaborators-img-container">
								<img src="assets/Ellipse 24.png" />
								<img src="assets/Ellipse 25.png" />
								<img src="assets/Ellipse 26.png" />
							</div>
							<p><u>Shervonne</u> and others...</p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
