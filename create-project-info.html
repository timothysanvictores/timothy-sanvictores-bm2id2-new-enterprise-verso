<html lang="en">

	<body>
		<div id="top-nav">

			<div id="create-section-container">

					<div class="input-with-icon">

				</div>
			</div>

			<div id="create-section-container">
				<h4>Production dates</h4>
				<div id="create-section-container-v2">
					<div id="half-width-input">
						<div class="input-with-icon">
							<img src="assets/icons/Calendar.svg" />
							<input type="text" placeholder="03 / 2023" />
						</div>
					</div>
					<div id="half-width-input">
						<div class="input-with-icon">
							<img src="assets/icons/Calendar.svg" />
							<input type="text" placeholder="03 / 2023" />
						</div>
					</div>
				</div>
			</div>

			<div id="create-section-container">
				<h4>Synopsis</h4>
				<textarea class="textarea" placeholder="Write your synopsis..."></textarea>
			</div>
		</div>

		<div id="content-border"></div>
		<div id="background"></div>
